<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Staff Detail — Crescent Campus</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:        #08172E;
  --navy-2:      #0F2340;
  --navy-3:      #162F54;
  --gold:        #C9A84C;
  --gold-2:      #DDB95E;
  --gold-3:      #EDD080;
  --gold-pale:   #FBF3DC;
  --white:       #FFFFFF;
  --off:         #F4F6F9;
  --muted:       #8FA3BC;
  --text:        #0F2340;
  --card-bg:     #FFFFFF;
  --border:      rgba(0,0,0,0.06);
  --card-shadow: 0 2px 14px rgba(8,23,46,0.07);
}

body.dark {
  --off:      #07111F;
  --card-bg:  #0F2340;
  --text:     #E8EEF5;
  --muted:    #6B85A0;
  --border:   rgba(255,255,255,0.06);
  --card-shadow: 0 2px 14px rgba(0,0,0,0.3);
}
body.accessible { font-size: 18px; line-height: 1.7; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--off);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 40px;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ── HERO ── */
.hero {
  background: var(--navy);
  padding: 20px 20px 62px;
  position: relative; overflow: hidden;
}
.hero-mesh {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 80% at 100% 20%, rgba(236,72,153,0.13) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 0%  100%, rgba(59,130,246,0.07) 0%, transparent 70%);
}
.hero-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.06) 1px, transparent 1px);
  background-size: 26px 26px;
  -webkit-mask-image: linear-gradient(to bottom, transparent, black 40%, black 70%, transparent);
  mask-image: linear-gradient(to bottom, transparent, black 40%, black 70%, transparent);
}

.hero-top {
  position: relative; z-index: 2;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.back-btn {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.75);
  padding: 8px 14px 8px 10px; border-radius: 10px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: background 0.2s; font-family: 'DM Sans', sans-serif;
}
.back-btn:hover { background: rgba(255,255,255,0.14); }

/* Status badge in hero top-right */
.status-badge {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.03em;
}
.status-badge.available { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #34D399; }
.status-badge.inclass   { background: rgba(239,68,68,0.15);  border: 1px solid rgba(239,68,68,0.3);  color: #FCA5A5; }
.status-badge.onleave   { background: rgba(107,114,128,0.15);border: 1px solid rgba(107,114,128,0.3);color: rgba(255,255,255,0.5); }
.badge-dot { width: 5px; height: 5px; border-radius: 50%; }
.available .badge-dot { background: #10B981; animation: blink 1.8s ease-in-out infinite; }
.inclass   .badge-dot { background: #EF4444; }
.onleave   .badge-dot { background: #9CA3AF; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Profile row in hero */
.profile-row {
  position: relative; z-index: 2;
  display: flex; align-items: center; gap: 16px;
}

.avatar-wrap { position: relative; flex-shrink: 0; }
.avatar-ring {
  width: 72px; height: 72px; border-radius: 50%;
  border: 2.5px solid rgba(236,72,153,0.4); padding: 3px;
}
.avatar-inner {
  width: 100%; height: 100%; border-radius: 50%;
  background: linear-gradient(135deg, #EC4899, #F472B6);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600;
  color: var(--white); overflow: hidden;
}
.avatar-inner img {
  width: 100%; height: 100%; object-fit: cover;
}
.avatar-status {
  position: absolute; bottom: 3px; right: 3px;
  width: 14px; height: 14px; border-radius: 50%;
  border: 2.5px solid var(--navy);
}
.avatar-status.available { background: #10B981; }
.avatar-status.inclass   { background: #EF4444; }
.avatar-status.onleave   { background: #9CA3AF; }

.profile-info { flex: 1; min-width: 0; }
.profile-name {
  font-family: 'Fraunces', serif;
  font-size: 22px; font-weight: 600; color: var(--white);
  letter-spacing: -0.01em; margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.profile-desig { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
.dept-chip {
  display: inline-flex; align-items: center;
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.3);
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; color: var(--gold-2);
  letter-spacing: 0.04em; text-transform: uppercase;
}

/* ── MAIN CARD ── */
.main-card {
  background: var(--card-bg); border-radius: 20px;
  margin: -44px 16px 0;
  border: 1px solid var(--border);
  box-shadow: 0 16px 40px rgba(8,23,46,0.13);
  overflow: hidden; position: relative; z-index: 10;
  animation: fadeUp 0.45s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-strip {
  height: 4px;
  background: linear-gradient(90deg, #EC4899, #F472B6, #EC4899);
  background-size: 200% 100%;
  animation: shimmer 3s ease-in-out infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* Info grid */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
.info-cell { background: var(--card-bg); padding: 15px 18px; transition: background 0.18s; }
.info-cell:hover { background: var(--off); }
.info-cell.full { grid-column: 1 / -1; }

.cell-icon {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; margin-bottom: 7px;
}
.cell-icon.pink   { background: rgba(236,72,153,0.10); }
.cell-icon.blue   { background: rgba(59,130,246,0.10); }
.cell-icon.green  { background: rgba(16,185,129,0.10); }
.cell-icon.gold   { background: rgba(201,168,76,0.12); }
.cell-icon.purple { background: rgba(139,92,246,0.10); }
.cell-icon.orange { background: rgba(249,115,22,0.10); }

.cell-label { font-size: 10.5px; font-weight: 600; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }
.cell-value { font-size: 13.5px; font-weight: 600; color: var(--text); }

/* Status cell pill */
.status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
}
.status-pill.available { background: rgba(16,185,129,0.1); color: #065F46; border: 1px solid rgba(16,185,129,0.2); }
.status-pill.inclass   { background: rgba(239,68,68,0.1);  color: #991B1B; border: 1px solid rgba(239,68,68,0.2); }
.status-pill.onleave   { background: rgba(107,114,128,0.1);color: #374151; border: 1px solid rgba(107,114,128,0.2); }
.s-dot { width: 5px; height: 5px; border-radius: 50%; }
.available .s-dot { background: #10B981; animation: blink 2s ease-in-out infinite; }
.inclass   .s-dot { background: #EF4444; }
.onleave   .s-dot { background: #9CA3AF; }

/* ── GUIDE SECTION ── */
.guide-card {
  margin: 14px 16px 0;
  background: var(--navy); border-radius: 16px;
  padding: 16px 18px; border: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 8px 24px rgba(8,23,46,0.18);
  position: relative; overflow: hidden;
  animation: fadeUp 0.45s ease 0.1s both;
}
.guide-card::before {
  content: ''; position: absolute; right: -10px; top: -10px;
  width: 80px; height: 80px;
  background: radial-gradient(circle, rgba(236,72,153,0.15) 0%, transparent 70%);
}
.guide-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  position: relative; z-index: 1;
}
.guide-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(236,72,153,0.15); border: 1px solid rgba(236,72,153,0.25);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.guide-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.04em; }
.guide-text { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.6; position: relative; z-index: 1; }

/* ── ACTIONS ── */
.actions {
  padding: 16px 16px 0;
  display: flex; flex-direction: column; gap: 10px;
  animation: fadeUp 0.45s ease 0.15s both;
}
.nav-btn {
  width: 100%; padding: 15px; border: none; border-radius: 14px;
  font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: all 0.25s;
  background: linear-gradient(135deg, var(--gold), var(--gold-2));
  color: var(--navy); box-shadow: 0 8px 24px rgba(201,168,76,0.4);
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.nav-btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 60%);
}
.nav-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(201,168,76,0.5); }
.nav-btn:active { transform: scale(0.98); }

.back-action-btn {
  width: 100%; padding: 13px; border: none; border-radius: 14px;
  font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: all 0.22s;
  background: var(--off); color: var(--muted);
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.back-action-btn:hover { background: var(--navy); color: var(--white); border-color: var(--navy); }
</style>
</head>
<body>

<script>
  if (localStorage.dark   === "on") document.body.classList.add("dark");
  if (localStorage.access === "on") document.body.classList.add("accessible");
</script>

<!-- ── HERO ── -->
<div class="hero">
  <div class="hero-mesh"></div>
  <div class="hero-grid"></div>

  <div class="hero-top">
    <button class="back-btn" onclick="history.back()">← Back</button>
    <div class="status-badge" id="statusBadge">
      <span class="badge-dot"></span>
      <span id="statusBadgeLabel">Loading</span>
    </div>
  </div>

  <div class="profile-row">
    <div class="avatar-wrap">
      <div class="avatar-ring">
        <div class="avatar-inner" id="avatarEl">S</div>
      </div>
      <div class="avatar-status" id="avatarStatus"></div>
    </div>
    <div class="profile-info">
      <div class="profile-name" id="profileName">—</div>
      <div class="profile-desig" id="profileDesig">—</div>
      <span class="dept-chip" id="deptChip">—</span>
    </div>
  </div>
</div>

<!-- ── INFO CARD ── -->
<div class="main-card">
  <div class="card-strip"></div>
  <div class="info-grid" id="infoGrid"></div>
</div>

<!-- ── GUIDE ── -->
<div id="guideSection"></div>

<!-- ── ACTIONS ── -->
<div class="actions">
  <button class="nav-btn" onclick="navigate()">🧭 Navigate to Cabin</button>
  <button class="back-action-btn" onclick="history.back()">← Go Back</button>
</div>

<script>
  /* ── READ URL PARAMS ── */
  const p = new URLSearchParams(location.search);
  const staff = {
    name:        p.get("name")        || "Staff",
    dept:        p.get("dept")        || "-",
    designation: p.get("designation") || "-",
    floor:       p.get("floor")       || "-",
    cabin:       p.get("cabin")       || "-",
    status:      p.get("status")      || "Unavailable",
    block:       p.get("block")       || ""
  };

  /* ── STATUS CLASS ── */
  const sc =
    staff.status === "Available" ? "available" :
    staff.status === "In Class"  ? "inclass"   : "onleave";

  const statusLabel =
    staff.status === "Available" ? "Available" :
    staff.status === "In Class"  ? "In Class"  : "On Leave";

  /* ── POPULATE HERO ── */
  document.getElementById("profileName").innerText  = staff.name;
  document.getElementById("profileDesig").innerText = staff.designation;
  document.getElementById("deptChip").innerText     = staff.dept.toUpperCase();

  /* Status badge */
  const badge = document.getElementById("statusBadge");
  badge.className = `status-badge ${sc}`;
  document.getElementById("statusBadgeLabel").innerText = statusLabel;

  /* Avatar */
  const avatarEl     = document.getElementById("avatarEl");
  const avatarStatus = document.getElementById("avatarStatus");
  avatarEl.innerText = staff.name.charAt(0).toUpperCase();
  avatarStatus.className = `avatar-status ${sc}`;

  /* ── INFO GRID ── */
  document.getElementById("infoGrid").innerHTML = `
    <div class="info-cell">
      <div class="cell-icon pink">🏛️</div>
      <div class="cell-label">Department</div>
      <div class="cell-value">${staff.dept.toUpperCase()}</div>
    </div>
    <div class="info-cell">
      <div class="cell-icon purple">🎓</div>
      <div class="cell-label">Designation</div>
      <div class="cell-value">${staff.designation}</div>
    </div>
    <div class="info-cell">
      <div class="cell-icon blue">🏢</div>
      <div class="cell-label">Block</div>
      <div class="cell-value">${staff.block || "Not specified"}</div>
    </div>
    <div class="info-cell">
      <div class="cell-icon gold">🏗️</div>
      <div class="cell-label">Floor</div>
      <div class="cell-value">${staff.floor}</div>
    </div>
    <div class="info-cell">
      <div class="cell-icon orange">🚪</div>
      <div class="cell-label">Cabin</div>
      <div class="cell-value">${staff.cabin}</div>
    </div>
    <div class="info-cell">
      <div class="cell-icon green">📊</div>
      <div class="cell-label">Status</div>
      <div class="cell-value">
        <span class="status-pill ${sc}">
          <span class="s-dot"></span>
          ${staff.status}
        </span>
      </div>
    </div>`;

  /* ── GUIDE (if cabin or floor available) ── */
  if (staff.cabin && staff.cabin !== "-") {
    document.getElementById("guideSection").innerHTML = `
      <div class="guide-card">
        <div class="guide-header">
          <div class="guide-icon">🧭</div>
          <div class="guide-label">How to Find</div>
        </div>
        <div class="guide-text">
          Head to the <strong style="color:var(--white)">${staff.block || staff.dept.toUpperCase() + " Block"}</strong>,
          go to the <strong style="color:var(--white)">${staff.floor}</strong>,
          and locate cabin <strong style="color:var(--gold-2)">${staff.cabin}</strong>.
        </div>
      </div>`;
  }

  /* ── AR NAVIGATION ── */
  function navigate() {
    fetch("data/locations.json")
      .then(r => r.json())
      .then(locations => {
        let blockName = (staff.block || "").trim().toLowerCase();

        const blockMap = {
          "cse":                       "Computer Science Block",
          "cse block":                 "Computer Science Block",
          "computer science":          "Computer Science Block",
          "computer science block":    "Computer Science Block",
          "mech":                      "School of Mechanical Sciences",
          "mech block":                "School of Mechanical Sciences",
          "mechanical":                "School of Mechanical Sciences",
          "mechanical block":          "School of Mechanical Sciences",
          "eee":                       "Basic Sciences Block",
          "eee block":                 "Basic Sciences Block",
          "ece":                       "Basic Sciences Block",
          "ece block":                 "Basic Sciences Block",
          "basic sciences":            "Basic Sciences Block",
          "basic sciences block":      "Basic Sciences Block",
          "civil":                     "Crescent School of Architecture",
          "civil block":               "Crescent School of Architecture",
          "architecture":              "Crescent School of Architecture",
          "architecture block":        "Crescent School of Architecture",
          "mba":                       "School of Management",
          "management":                "School of Management",
          "management block":          "School of Management"
        };

        const targetName = blockMap[blockName] || blockName;

        const index = locations.findIndex(loc =>
          loc.name.trim().toLowerCase() === targetName.trim().toLowerCase()
        );

        if (index === -1) {
          alert("AR navigation not available for this block");
          return;
        }

        location.href = `confirm.html?place=${index}&role=student`;
      })
      .catch(() => alert("Unable to load navigation data"));
  }
</script>

</body>
</html>
