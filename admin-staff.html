<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Staff Management — Crescent Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:        #08172E;
  --navy-2:      #0F2340;
  --navy-3:      #162F54;
  --gold:        #C9A84C;
  --gold-2:      #DDB95E;
  --gold-3:      #EDD080;
  --gold-pale:   #FBF3DC;
  --white:       #FFFFFF;
  --off:         #F4F6F9;
  --muted:       #8FA3BC;
  --text:        #0F2340;
  --card-bg:     #FFFFFF;
  --border:      rgba(0,0,0,0.06);
  --card-shadow: 0 2px 14px rgba(8,23,46,0.07);
  --success:     #10B981;
  --danger:      #EF4444;
  --warn:        #F59E0B;
  --pink:        #EC4899;
}

html, body { overflow-x: hidden; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--off);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 48px;
}

/* ── TOPBAR ── */
.topbar {
  background: var(--navy);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.back-btn {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.7);
  padding: 7px 13px 7px 10px; border-radius: 10px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: background 0.2s; font-family: 'DM Sans', sans-serif;
}
.back-btn:hover { background: rgba(255,255,255,0.14); }
.topbar-title strong {
  display: block; font-family: 'Fraunces', serif;
  font-size: 15px; font-weight: 600; color: var(--white);
}
.topbar-title span { font-size: 10.5px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
.add-btn {
  display: flex; align-items: center; gap: 7px;
  background: linear-gradient(135deg, var(--gold), var(--gold-2));
  color: var(--navy); padding: 9px 18px; border-radius: 10px;
  font-size: 13px; font-weight: 600; border: none; cursor: pointer;
  transition: all 0.22s; font-family: 'DM Sans', sans-serif;
  box-shadow: 0 4px 14px rgba(201,168,76,0.4);
  position: relative; overflow: hidden;
}
.add-btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 60%);
}
.add-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(201,168,76,0.5); }

/* ── HERO ── */
.hero {
  background: var(--navy);
  padding: 0 20px 28px; position: relative; overflow: hidden;
}
.hero-mesh {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 80% at 95% 40%, rgba(236,72,153,0.1) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 5%  90%, rgba(59,130,246,0.07) 0%, transparent 70%);
}
.hero-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.06) 1px, transparent 1px);
  background-size: 28px 28px;
  -webkit-mask-image: linear-gradient(to bottom, transparent, black 40%, black 70%, transparent);
  mask-image: linear-gradient(to bottom, transparent, black 40%, black 70%, transparent);
}
.hero-content { position: relative; z-index: 2; padding-top: 20px; }
.hero-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(236,72,153,0.15);
  border: 1px solid rgba(236,72,153,0.3);
  padding: 4px 12px; border-radius: 40px;
  font-size: 11px; font-weight: 600; color: #F9A8D4;
  letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 12px;
}
.hero-tag-dot { width: 6px; height: 6px; border-radius: 50%; background: #EC4899; animation: blink 1.8s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.hero-title { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600; color: var(--white); line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 6px; }
.hero-title .accent { color: var(--gold-2); font-style: italic; }
.hero-sub { font-size: 13px; color: rgba(255,255,255,0.45); }

/* ── STATS ── */
.stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; padding: 18px 16px 0;
  animation: fadeUp 0.4s ease 0.1s both;
}
.sf {
  background: var(--card-bg); border-radius: 14px;
  padding: 14px 10px 12px; text-align: center;
  border: 1px solid var(--border); box-shadow: var(--card-shadow);
  transition: all 0.22s; position: relative; overflow: hidden;
}
.sf::before {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; border-radius: 0 0 14px 14px; opacity: 0; transition: opacity 0.22s;
}
.sf.pink::before  { background: linear-gradient(90deg, #EC4899, #F472B6); }
.sf.green::before { background: linear-gradient(90deg, #10B981, #34D399); }
.sf.red::before   { background: linear-gradient(90deg, #EF4444, #F87171); }
.sf:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,0,0,0.1); }
.sf:hover::before { opacity: 1; }
.sf-emoji { font-size: 18px; margin-bottom: 6px; display: block; }
.sf-num { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--navy); line-height: 1; margin-bottom: 3px; }
.sf-label { font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: 0.04em; }

/* ── DEPT FILTER ── */
.filter-row {
  display: flex; gap: 8px; padding: 16px 16px 0;
  overflow-x: auto; scrollbar-width: none;
  animation: fadeUp 0.4s ease 0.15s both;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0; padding: 7px 16px;
  border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--card-bg); color: var(--muted);
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all 0.2s; font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--pink); color: var(--pink); }
.filter-btn.active {
  background: linear-gradient(135deg, #EC4899, #F472B6);
  border-color: #EC4899; color: var(--white);
  box-shadow: 0 4px 12px rgba(236,72,153,0.35);
}

/* ── SECTION ── */
.section { padding: 20px 16px 0; }
.sec-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 14px; }
.sec-title { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; color: var(--text); }
.sec-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ── FORM CARD ── */
.form-card {
  background: var(--card-bg); border-radius: 20px;
  border: 1px solid var(--border); box-shadow: var(--card-shadow);
  overflow: hidden; display: none;
  animation: fadeUp 0.35s ease both; margin-bottom: 4px;
}
.form-card.open { display: block; }
.form-card-header {
  padding: 18px 20px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.form-card-title { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; color: var(--text); }
.form-close {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--off); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; cursor: pointer; color: var(--muted); transition: all 0.2s;
}
.form-close:hover { background: #FEE2E2; color: var(--danger); border-color: rgba(239,68,68,0.2); }
.form-body { padding: 20px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label {
  font-size: 11px; font-weight: 600; color: var(--muted);
  letter-spacing: 0.05em; text-transform: uppercase;
}
.form-group input,
.form-group select {
  padding: 12px 14px; border-radius: 11px;
  border: 1.5px solid var(--border);
  font-size: 13.5px; font-family: 'DM Sans', sans-serif;
  outline: none; background: var(--off); color: var(--text);
  transition: all 0.22s;
}
.form-group input:focus,
.form-group select:focus {
  border-color: var(--gold); background: var(--white);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
}
.form-group input::placeholder { color: var(--muted); opacity: 0.7; }
.form-actions { display: flex; gap: 10px; margin-top: 4px; }
.save-btn {
  flex: 1; padding: 13px;
  background: linear-gradient(135deg, var(--gold), var(--gold-2));
  color: var(--navy); border: none; border-radius: 12px;
  font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif;
  cursor: pointer; box-shadow: 0 6px 18px rgba(201,168,76,0.4);
  transition: all 0.22s; position: relative; overflow: hidden;
}
.save-btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 60%);
}
.save-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(201,168,76,0.5); }
.cancel-btn {
  padding: 13px 20px; background: var(--off); color: var(--muted);
  border: 1.5px solid var(--border); border-radius: 12px;
  font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: all 0.22s;
}
.cancel-btn:hover { border-color: var(--danger); color: var(--danger); background: #FEE2E2; }

/* ── DEPT SECTION ── */
.dept-block { margin-bottom: 20px; }
.dept-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px;
}
.dept-icon {
  width: 38px; height: 38px; border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.dept-icon.cse    { background: rgba(59,130,246,0.12); }
.dept-icon.ece    { background: rgba(16,185,129,0.12); }
.dept-icon.eee    { background: rgba(245,158,11,0.12); }
.dept-icon.civil  { background: rgba(139,92,246,0.12); }
.dept-icon.mech   { background: rgba(249,115,22,0.12); }

.dept-name { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; color: var(--text); }
.dept-count { font-size: 11px; color: var(--muted); margin-top: 1px; }

/* ── STAFF CARDS ── */
.staff-list { display: flex; flex-direction: column; gap: 10px; }

.staff-card {
  background: var(--card-bg); border-radius: 16px;
  border: 1px solid var(--border); box-shadow: var(--card-shadow);
  overflow: hidden; display: flex; align-items: stretch;
  transition: all 0.25s;
}
.staff-card:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(8,23,46,0.1); }

.staff-stripe { width: 4px; flex-shrink: 0; }
.staff-stripe.active-stripe   { background: linear-gradient(to bottom, #10B981, #34D399); }
.staff-stripe.inactive-stripe { background: linear-gradient(to bottom, #EF4444, #F87171); }

.staff-inner {
  flex: 1; padding: 14px 14px 12px 14px;
  display: flex; align-items: center; gap: 13px;
}

.staff-av {
  width: 42px; height: 42px; flex-shrink: 0;
  border-radius: 50%;
  background: linear-gradient(135deg, #EC4899, #F472B6);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600;
  color: var(--white);
}

.staff-info { flex: 1; min-width: 0; }
.staff-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.staff-desig { font-size: 11.5px; color: var(--muted); margin-bottom: 6px; }
.staff-meta { display: flex; flex-wrap: wrap; gap: 8px; }
.staff-meta span { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 3px; }

.staff-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; padding: 14px 14px 12px 0; flex-shrink: 0; }

.status-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 10.5px; font-weight: 600;
}
.status-pill.active   { background: rgba(16,185,129,0.1); color: #065F46; border: 1px solid rgba(16,185,129,0.2); }
.status-pill.inactive { background: rgba(239,68,68,0.1);  color: #991B1B; border: 1px solid rgba(239,68,68,0.2); }
.status-dot { width: 5px; height: 5px; border-radius: 50%; }
.status-pill.active   .status-dot { background: #10B981; animation: blink 2s ease-in-out infinite; }
.status-pill.inactive .status-dot { background: #EF4444; }

.staff-actions { display: flex; gap: 5px; }
.act-btn {
  padding: 5px 11px; border-radius: 8px; font-size: 11px; font-weight: 600;
  border: none; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
}
.act-btn.edit   { background: rgba(59,130,246,0.1); color: #1D4ED8; border: 1px solid rgba(59,130,246,0.2); }
.act-btn.edit:hover   { background: #3B82F6; color: var(--white); }
.act-btn.toggle-act { background: rgba(245,158,11,0.1); color: #92400E; border: 1px solid rgba(245,158,11,0.2); }
.act-btn.toggle-act:hover { background: #F59E0B; color: var(--white); }
.act-btn.delete { background: rgba(239,68,68,0.1); color: #991B1B; border: 1px solid rgba(239,68,68,0.2); }
.act-btn.delete:hover { background: #EF4444; color: var(--white); }

/* Empty state */
.empty-state {
  text-align: center; padding: 40px 20px;
  background: var(--card-bg); border-radius: 16px;
  border: 1px solid var(--border); box-shadow: var(--card-shadow);
}
.empty-state span { font-size: 40px; display: block; margin-bottom: 12px; }
.empty-state h3 { font-family: 'Fraunces', serif; font-size: 16px; color: var(--text); margin-bottom: 6px; }
.empty-state p  { font-size: 13px; color: var(--muted); }

/* ── TOAST ── */
.toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  padding: 12px 20px; border-radius: 12px;
  font-size: 13px; font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  z-index: 500; transition: transform 0.35s ease;
  display: flex; align-items: center; gap: 8px;
  white-space: nowrap; font-family: 'DM Sans', sans-serif;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: #F0FDF4; color: #065F46; border: 1px solid #A7F3D0; }
.toast.error   { background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }
.toast.warn    { background: #FFFBEB; color: #92400E; border: 1px solid #FDE68A; }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hero { animation: fadeUp 0.4s ease both; }
.section:nth-of-type(1) { animation: fadeUp 0.4s ease 0.1s both; }
.section:nth-of-type(2) { animation: fadeUp 0.4s ease 0.15s both; }

/* ── RESPONSIVE ── */
@media (max-width: 520px) {
  .form-grid { grid-template-columns: 1fr; }
  .staff-inner { gap: 10px; }
  .staff-av { width: 36px; height: 36px; font-size: 14px; }
  .staff-actions { flex-wrap: wrap; }
}
</style>
</head>
<body>

<div class="toast" id="toast"><span id="toastMsg"></span></div>

<!-- ── TOPBAR ── -->
<header class="topbar">
  <div class="topbar-left">
    <button class="back-btn" onclick="location.href='admin-dashboard.html'">← Back</button>
    <div class="topbar-title">
      <strong>Staff Management</strong>
      <span>Admin Panel</span>
    </div>
  </div>
  <button class="add-btn" onclick="openForm()">＋ Add Staff</button>
</header>

<!-- ── HERO ── */
<section class="hero">
  <div class="hero-mesh"></div>
  <div class="hero-grid"></div>
  <div class="hero-content">
    <div class="hero-tag"><span class="hero-tag-dot"></span>Staff Control</div>
    <h1 class="hero-title"><span class="accent">Faculty</span> Location Management</h1>
    <p class="hero-sub">Manage staff records, cabin locations & availability status</p>
  </div>
</section>

<!-- ── STATS ── -->
<div class="stats-row">
  <div class="sf pink">
    <span class="sf-emoji">👩‍🏫</span>
    <div class="sf-num" id="totalCount">0</div>
    <div class="sf-label">Total Staff</div>
  </div>
  <div class="sf green">
    <span class="sf-emoji">✅</span>
    <div class="sf-num" id="activeCount">0</div>
    <div class="sf-label">Active</div>
  </div>
  <div class="sf red">
    <span class="sf-emoji">⛔</span>
    <div class="sf-num" id="inactiveCount">0</div>
    <div class="sf-label">Inactive</div>
  </div>
</div>

<!-- ── DEPT FILTER ── -->
<div class="filter-row">
  <button class="filter-btn active" onclick="filterDept('all', this)">All Depts</button>
  <button class="filter-btn" onclick="filterDept('cse',  this)">💻 CSE</button>
  <button class="filter-btn" onclick="filterDept('ece',  this)">📡 ECE</button>
  <button class="filter-btn" onclick="filterDept('eee',  this)">⚡ EEE</button>
  <button class="filter-btn" onclick="filterDept('civil',this)">🏗️ Civil</button>
  <button class="filter-btn" onclick="filterDept('mech', this)">⚙️ Mech</button>
</div>

<!-- ── FORM ── -->
<div class="section">
  <div class="form-card" id="formCard">
    <div class="form-card-header">
      <div class="form-card-title" id="formTitle">Add New Staff</div>
      <div class="form-close" onclick="closeForm()">✕</div>
    </div>
    <div class="form-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Department *</label>
          <select id="dept">
            <option value="cse">💻 CSE</option>
            <option value="ece">📡 ECE</option>
            <option value="eee">⚡ EEE</option>
            <option value="civil">🏗️ Civil</option>
            <option value="mech">⚙️ Mechanical</option>
          </select>
        </div>
        <div class="form-group">
          <label>Staff Name *</label>
          <input id="name" placeholder="e.g. Dr. Priya Sharma"/>
        </div>
        <div class="form-group">
          <label>Designation</label>
          <input id="designation" placeholder="e.g. Associate Professor"/>
        </div>
        <div class="form-group">
          <label>Floor</label>
          <input id="floor" placeholder="e.g. Ground Floor"/>
        </div>
        <div class="form-group">
          <label>Cabin</label>
          <input id="cabin" placeholder="e.g. A-201"/>
        </div>
        <div class="form-group full">
          <label>Navigation Guidance</label>
          <input id="guide" placeholder="e.g. Enter CS Block, 2nd floor, room A-201"/>
        </div>
      </div>
      <div class="form-actions">
        <button class="save-btn" id="saveBtn" onclick="saveStaff()">💾 Save Staff</button>
        <button class="cancel-btn" onclick="closeForm()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- ── STAFF LIST ── -->
<div class="section" style="padding-bottom:24px;">
  <div class="sec-head">
    <div>
      <div class="sec-title">Faculty Directory</div>
      <div class="sec-sub">Live from Firebase</div>
    </div>
  </div>
  <div id="staffList">
    <div class="empty-state">
      <span>👩‍🏫</span>
      <h3>No staff yet</h3>
      <p>Tap "+ Add Staff" to register your first faculty member</p>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from
  "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getDatabase, ref, set, onValue, remove, update }
  from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey:        "AIzaSyBPykUmk_KgytoMbDjhOLR8AwwoSmt4EL4",
  authDomain:    "crescent-navigation-system.firebaseapp.com",
  databaseURL:   "https://crescent-navigation-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:     "crescent-navigation-system",
  appId:         "1:418104083143:web:279d0dfa88f2b700fd74e2"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

onAuthStateChanged(auth, user => {
  if (!user) location.href = "admin-login.html";
});

let editKey      = null;
let allData      = {};
let activeDept   = "all";

/* Dept display config */
const deptConfig = {
  cse:   { label: "Computer Science (CSE)", icon: "💻", iconClass: "cse"  },
  ece:   { label: "Electronics & Comm (ECE)", icon: "📡", iconClass: "ece"  },
  eee:   { label: "Electrical Engineering (EEE)", icon: "⚡", iconClass: "eee"  },
  civil: { label: "Civil Engineering", icon: "🏗️", iconClass: "civil" },
  mech:  { label: "Mechanical Engineering", icon: "⚙️", iconClass: "mech"  }
};

/* ── REALTIME LOAD ── */
onValue(ref(db, "faculty"), snap => {
  if (!snap.exists()) {
    allData = {};
    renderStaff();
    updateStats({});
    return;
  }
  allData = snap.val();
  renderStaff();
  updateStats(allData);
});

function renderStaff() {
  const container = document.getElementById("staffList");
  const data = allData;

  const depts = activeDept === "all"
    ? Object.keys(data)
    : Object.keys(data).filter(d => d === activeDept);

  if (!depts.length || !Object.keys(data).length) {
    container.innerHTML = `
      <div class="empty-state">
        <span>👩‍🏫</span><h3>No staff found</h3>
        <p>No staff in this department yet</p>
      </div>`;
    return;
  }

  let html = "";

  depts.forEach(dept => {
    const members = data[dept];
    if (!members) return;
    const cfg = deptConfig[dept] || { label: dept.toUpperCase(), icon: "👤", iconClass: "cse" };
    const count = Object.keys(members).length;

    html += `
      <div class="dept-block" data-dept="${dept}">
        <div class="dept-header">
          <div class="dept-icon ${cfg.iconClass}">${cfg.icon}</div>
          <div>
            <div class="dept-name">${cfg.label}</div>
            <div class="dept-count">${count} member${count !== 1 ? "s" : ""}</div>
          </div>
        </div>
        <div class="staff-list">`;

    Object.keys(members).forEach(key => {
      const s      = members[key];
      const isActive = s.status === "Active";
      const initial  = (s.name || "S").charAt(0).toUpperCase();

      html += `
        <div class="staff-card">
          <div class="staff-stripe ${isActive ? "active-stripe" : "inactive-stripe"}"></div>
          <div class="staff-inner">
            <div class="staff-av">${initial}</div>
            <div class="staff-info">
              <div class="staff-name">${s.name || "—"}</div>
              <div class="staff-desig">${s.designation || "Faculty"}</div>
              <div class="staff-meta">
                ${s.floor  ? `<span>🏢 ${s.floor}</span>`  : ""}
                ${s.cabin  ? `<span>🚪 ${s.cabin}</span>`  : ""}
                ${s.guide  ? `<span>🧭 ${s.guide.substring(0,28)}${s.guide.length>28?"…":""}</span>` : ""}
              </div>
            </div>
          </div>
          <div class="staff-right">
            <div class="status-pill ${isActive ? "active" : "inactive"}">
              <span class="status-dot"></span>
              ${s.status || "Active"}
            </div>
            <div class="staff-actions">
              <button class="act-btn edit"
                onclick="editStaff('${dept}','${key}','${esc(s.name)}','${esc(s.designation)}','${esc(s.floor)}','${esc(s.cabin)}','${esc(s.guide)}')">
                ✏️
              </button>
              <button class="act-btn toggle-act"
                onclick="toggleStatus('${dept}','${key}','${s.status}')">
                ${isActive ? "⏸" : "▶"}
              </button>
              <button class="act-btn delete"
                onclick="deleteStaff('${dept}','${key}')">
                🗑️
              </button>
            </div>
          </div>
        </div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
}

function esc(str) {
  return (str || "").replace(/'/g, "\\'").replace(/"/g, "&quot;");
}

function updateStats(data) {
  let total = 0, active = 0, inactive = 0;
  Object.keys(data).forEach(dept => {
    Object.keys(data[dept]).forEach(key => {
      total++;
      data[dept][key].status === "Active" ? active++ : inactive++;
    });
  });
  document.getElementById("totalCount").innerText    = total;
  document.getElementById("activeCount").innerText   = active;
  document.getElementById("inactiveCount").innerText = inactive;
}

/* ── FILTER ── */
window.filterDept = function(dept, btn) {
  activeDept = dept;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderStaff();
};

/* ── SAVE ── */
window.saveStaff = function() {
  const dept        = document.getElementById("dept").value;
  const name        = document.getElementById("name").value.trim();
  const designation = document.getElementById("designation").value.trim();
  const floor       = document.getElementById("floor").value.trim();
  const cabin       = document.getElementById("cabin").value.trim();
  const guide       = document.getElementById("guide").value.trim();

  if (!name) { showToast("Please enter staff name", "error"); return; }

  const key = editKey || Date.now();
  const btn = document.getElementById("saveBtn");
  btn.innerText = "Saving...";

  set(ref(db, "faculty/" + dept + "/" + key), {
    name, designation, floor, cabin, guide, status: "Active"
  })
  .then(() => {
    showToast(editKey ? "✅ Staff updated!" : "✅ Staff added!", "success");
    closeForm(); resetForm();
  })
  .catch(() => showToast("❌ Failed to save", "error"))
  .finally(() => { btn.innerText = "💾 Save Staff"; });
};

/* ── EDIT ── */
window.editStaff = function(dept, key, name, designation, floor, cabin, guide) {
  editKey = key;
  document.getElementById("dept").value        = dept;
  document.getElementById("name").value        = name;
  document.getElementById("designation").value = designation;
  document.getElementById("floor").value       = floor;
  document.getElementById("cabin").value       = cabin;
  document.getElementById("guide").value       = guide;
  document.getElementById("formTitle").innerText = "Edit Staff";
  openForm();
  window.scrollTo({ top: 0, behavior: "smooth" });
};

/* ── TOGGLE STATUS ── */
window.toggleStatus = function(dept, key, status) {
  const newStatus = status === "Active" ? "Inactive" : "Active";
  update(ref(db, "faculty/" + dept + "/" + key), { status: newStatus })
    .then(() => showToast(
      newStatus === "Active" ? "✅ Staff activated" : "⏸ Staff deactivated",
      newStatus === "Active" ? "success" : "warn"
    ));
};

/* ── DELETE ── */
window.deleteStaff = function(dept, key) {
  if (confirm("Are you sure you want to delete this staff member?")) {
    remove(ref(db, "faculty/" + dept + "/" + key))
      .then(() => showToast("🗑️ Staff deleted", "success"))
      .catch(() => showToast("❌ Delete failed", "error"));
  }
};

/* ── FORM CONTROLS ── */
window.openForm = function() {
  document.getElementById("formCard").classList.add("open");
};
window.closeForm = function() {
  document.getElementById("formCard").classList.remove("open");
  resetForm();
};
function resetForm() {
  editKey = null;
  ["name","designation","floor","cabin","guide"].forEach(id => {
    document.getElementById(id).value = "";
  });
  document.getElementById("dept").value = "cse";
  document.getElementById("formTitle").innerText = "Add New Staff";
}

/* ── TOAST ── */
window.showToast = function(msg, type = "success") {
  const toast = document.getElementById("toast");
  document.getElementById("toastMsg").innerText = msg;
  toast.className = `toast ${type} show`;
  setTimeout(() => toast.classList.remove("show"), 3500);
};
</script>

</body>
</html>
