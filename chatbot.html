<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Assistant — Crescent Campus</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:      #08172E;
  --navy-2:    #0F2340;
  --navy-3:    #162F54;
  --gold:      #C9A84C;
  --gold-2:    #DDB95E;
  --gold-3:    #EDD080;
  --gold-pale: #FBF3DC;
  --white:     #FFFFFF;
  --off:       #F4F6F9;
  --muted:     #8FA3BC;
  --text:      #0F2340;
  --border:    rgba(0,0,0,0.06);
  --user-bg:   #0F2340;
  --bot-bg:    #F4F6F9;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--off);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOPBAR ── */
.topbar {
  background: var(--navy);
  padding: 13px 18px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  position: relative; z-index: 10;
  box-shadow: 0 2px 20px rgba(0,0,0,0.25);
}

.topbar-left { display: flex; align-items: center; gap: 10px; }

.back-btn {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.7);
  padding: 7px 12px; border-radius: 10px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: background 0.2s; font-family: 'DM Sans', sans-serif;
}
.back-btn:hover { background: rgba(255,255,255,0.14); }

.bot-identity { display: flex; align-items: center; gap: 10px; }

.bot-av {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold-3));
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
  box-shadow: 0 0 12px rgba(201,168,76,0.4);
}

.bot-name-wrap strong {
  display: block;
  font-family: 'Fraunces', serif;
  font-size: 14px; font-weight: 600; color: var(--white);
}
.bot-name-wrap span { font-size: 11px; color: var(--muted); }

.online-badge {
  display: flex; align-items: center; gap: 5px;
  background: rgba(16,185,129,0.15);
  border: 1px solid rgba(16,185,129,0.25);
  padding: 4px 10px; border-radius: 20px;
  font-size: 10.5px; font-weight: 600; color: #34D399;
}
.online-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #10B981;
  animation: blink 1.8s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── MESSAGES AREA ── */
.messages-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex; flex-direction: column; gap: 14px;
  scroll-behavior: smooth;
  background: var(--off);
}

/* Custom scrollbar */
.messages-wrap::-webkit-scrollbar { width: 4px; }
.messages-wrap::-webkit-scrollbar-track { background: transparent; }
.messages-wrap::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

/* ── MESSAGE ROWS ── */
.msg-row {
  display: flex; align-items: flex-end; gap: 8px;
  animation: msgIn 0.3s ease both;
}
.msg-row.user-row { flex-direction: row-reverse; }

@keyframes msgIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Small bot avatar in chat */
.msg-av {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold-3));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0; margin-bottom: 2px;
}
.msg-av.user-av {
  background: linear-gradient(135deg, var(--navy-2), var(--navy-3));
  border: 1px solid rgba(255,255,255,0.1);
}

/* ── BUBBLES ── */
.bubble {
  max-width: 72%;
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 14px; line-height: 1.6;
  word-wrap: break-word; white-space: pre-line;
  position: relative;
}

/* User bubble */
.bubble.user {
  background: linear-gradient(135deg, var(--navy-2), var(--navy-3));
  color: var(--white);
  border-bottom-right-radius: 5px;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 4px 16px rgba(8,23,46,0.25);
}

/* Bot bubble */
.bubble.bot {
  background: var(--white);
  color: var(--text);
  border-bottom-left-radius: 5px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(8,23,46,0.06);
}

/* Confidence bar */
.confidence-row {
  display: flex; align-items: center; gap: 7px;
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid rgba(0,0,0,0.06);
}
.conf-label { font-size: 10.5px; color: var(--muted); white-space: nowrap; }
.conf-bar {
  flex: 1; height: 3px; border-radius: 2px;
  background: rgba(0,0,0,0.07); overflow: hidden;
}
.conf-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--gold), var(--gold-3));
  transition: width 0.6s ease;
}
.conf-pct { font-size: 10.5px; color: var(--muted); white-space: nowrap; }

/* ── TYPING INDICATOR ── */
.typing-indicator {
  display: none; align-items: flex-end; gap: 8px;
}
.typing-indicator.show { display: flex; }

.typing-bubble {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 18px; border-bottom-left-radius: 5px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 5px;
  box-shadow: 0 2px 12px rgba(8,23,46,0.06);
}
.typing-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted);
  animation: typingAnim 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingAnim {
  0%,60%,100% { transform: translateY(0); opacity: 0.4; }
  30%          { transform: translateY(-6px); opacity: 1; }
}

/* ── QUICK PROMPTS ── */
.quick-prompts {
  padding: 0 16px 12px;
  display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none; flex-shrink: 0;
}
.quick-prompts::-webkit-scrollbar { display: none; }

.qp-btn {
  flex-shrink: 0;
  background: var(--white);
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 7px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 500; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
}
.qp-btn:hover { border-color: var(--gold); background: var(--gold-pale); color: var(--navy); }

/* ── INPUT BAR ── */
.input-bar {
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 12px 14px 16px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
}

.input-wrap {
  flex: 1; position: relative;
  display: flex; align-items: center;
}

#question {
  width: 100%; padding: 12px 44px 12px 16px;
  border-radius: 14px; border: 1.5px solid var(--border);
  font-size: 14px; font-family: 'DM Sans', sans-serif;
  outline: none; background: var(--off); color: var(--text);
  transition: all 0.22s;
  resize: none; line-height: 1.4;
}
#question::placeholder { color: var(--muted); opacity: 0.8; }
#question:focus {
  border-color: var(--gold); background: var(--white);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
}

.send-btn {
  width: 44px; height: 44px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--gold), var(--gold-2));
  border: none; border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer;
  box-shadow: 0 4px 14px rgba(201,168,76,0.4);
  transition: all 0.22s; position: relative; overflow: hidden;
}
.send-btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 60%);
}
.send-btn:hover { transform: scale(1.06); box-shadow: 0 6px 18px rgba(201,168,76,0.5); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Error state */
.bubble.error {
  background: #FEF2F2; color: #991B1B;
  border-color: rgba(239,68,68,0.2);
}

/* Date divider */
.date-divider {
  text-align: center; font-size: 11px; color: var(--muted);
  display: flex; align-items: center; gap: 10px; margin: 4px 0;
}
.date-divider::before, .date-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
</style>
</head>
<body>

<!-- ── TOPBAR ── -->
<header class="topbar">
  <div class="topbar-left">
    <button class="back-btn" onclick="history.back()">← Back</button>
    <div class="bot-identity">
      <div class="bot-av">🤖</div>
      <div class="bot-name-wrap">
        <strong>Crescent AI</strong>
        <span>Campus Assistant</span>
      </div>
    </div>
  </div>
  <div class="online-badge">
    <span class="online-dot"></span>
    Online
  </div>
</header>

<!-- ── MESSAGES ── -->
<div class="messages-wrap" id="messages">

  <!-- Date divider -->
  <div class="date-divider">Today</div>

  <!-- Welcome message -->
  <div class="msg-row">
    <div class="msg-av">🤖</div>
    <div class="bubble bot">
      👋 Hello! I'm <strong>Crescent AI</strong>, your campus assistant.<br/>
      Ask me anything about buildings, labs, staff, events or how to navigate campus!
    </div>
  </div>

  <!-- Typing indicator (hidden by default) -->
  <div class="typing-indicator" id="typingIndicator">
    <div class="msg-av">🤖</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

</div>

<!-- ── QUICK PROMPTS ── -->
<div class="quick-prompts" id="quickPrompts">
  <button class="qp-btn" onclick="sendQuick('Where is the CS Block?')">📍 CS Block location</button>
  <button class="qp-btn" onclick="sendQuick('Where is the Main Gate?')">🚪 Main Gate</button>
  <button class="qp-btn" onclick="sendQuick('Where are the labs?')">🔬 Labs</button>
  <button class="qp-btn" onclick="sendQuick('What events are happening?')">🎉 Events</button>
  <button class="qp-btn" onclick="sendQuick('How do I find staff cabins?')">👩‍🏫 Staff location</button>
</div>

<!-- ── INPUT ── -->
<div class="input-bar">
  <div class="input-wrap">
    <input
      type="text"
      id="question"
      placeholder="Ask about Crescent campus..."
      autocomplete="off"
      onkeypress="if(event.key==='Enter') ask()"
    />
  </div>
  <button class="send-btn" id="sendBtn" onclick="ask()" title="Send">
    ➤
  </button>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const typingEl   = document.getElementById("typingIndicator");
  const sendBtn    = document.getElementById("sendBtn");
  const inputEl    = document.getElementById("question");

  /* ── SCROLL TO BOTTOM ── */
  function scrollBottom() {
    setTimeout(() => {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }, 60);
  }

  /* ── APPEND MESSAGE ── */
  function appendMessage(type, html, confidence) {
    /* Remove typing indicator before inserting */
    messagesEl.removeChild(typingEl);

    const row = document.createElement("div");
    row.className = `msg-row${type === "user" ? " user-row" : ""}`;

    const av = document.createElement("div");
    av.className = type === "user" ? "msg-av user-av" : "msg-av";
    av.innerText  = type === "user" ? "👤" : "🤖";

    const bubble = document.createElement("div");
    bubble.className = `bubble ${type}`;
    bubble.innerHTML = html;

    /* Confidence bar for bot messages */
    if (type === "bot" && confidence !== undefined) {
      const pct  = Math.min(100, Math.round(confidence * 100));
      const conf = document.createElement("div");
      conf.className = "confidence-row";
      conf.innerHTML = `
        <span class="conf-label">Confidence</span>
        <div class="conf-bar"><div class="conf-fill" style="width:${pct}%"></div></div>
        <span class="conf-pct">${pct}%</span>`;
      bubble.appendChild(conf);
    }

    row.appendChild(av);
    row.appendChild(bubble);

    /* Re-add typing indicator at the end */
    messagesEl.appendChild(row);
    messagesEl.appendChild(typingEl);

    scrollBottom();
  }

  /* ── SHOW / HIDE TYPING ── */
  function showTyping() {
    typingEl.classList.add("show");
    scrollBottom();
  }
  function hideTyping() {
    typingEl.classList.remove("show");
  }

  /* ── CONVERSATION HISTORY (multi-turn memory) ── */
  const conversationHistory = [];

  /* ── CAMPUS SYSTEM PROMPT ── */
  const SYSTEM_PROMPT = `You are Crescent AI, the official smart campus assistant for Crescent University (B.S. Abdur Rahman Crescent Institute of Science and Technology), Chennai, India.

You help students, visitors and staff with:
- Finding buildings, labs, classrooms and facilities on campus
- AR navigation — how to reach any location
- Department info: CSE, ECE, EEE, Mechanical, Civil, Architecture, MBA
- Lab availability, equipment and schedules
- Campus events and workshops
- Staff and faculty cabin locations
- Emergency services: Medical Centre, Security Office
- Smart features: live crowd status, landmark recognition, quick navigation

Crescent timetable (Monday–Saturday):
- 9:00–9:50   → 1st period
- 9:50–10:40  → 2nd period
- 10:40–11:00 → Break
- 11:00–11:50 → 3rd period
- 11:50–12:40 → 4th period
- 12:40–13:40 → Lunch break
- 13:40–14:30 → 5th period
- 14:30–15:20 → 6th period
- 15:20–16:10 → 7th period

Key campus locations:
- Main Gate → campus entry/exit
- Computer Science Block → CSE labs, classrooms
- Basic Sciences Block → ECE, EEE labs
- School of Mechanical Sciences → Mech labs
- Crescent School of Architecture → Civil, Arch
- School of Management → MBA
- Convocation Hall → events, ceremonies
- Library → books, study halls
- Medical Centre → first aid, emergency
- Canteen → food, busiest at lunch 12:40–13:40
- Sports Ground → athletics, recreation
- ATM, Parking Area

Keep answers short, friendly and helpful. For navigation questions, tell users to use the AR Navigation feature in the app. For real-time data (lab availability, crowd levels), direct them to the Live Status or Labs section.`;

  /* ── GROQ API KEY — free from console.groq.com ── */
  const GROQ_KEY = "";

  /* ── SEND ── */
  async function ask() {
    const question = inputEl.value.trim();
    if (!question) return;

    sendBtn.disabled = true;
    inputEl.value    = "";

    document.getElementById("quickPrompts").style.display = "none";

    appendMessage("user", question);
    showTyping();

    conversationHistory.push({ role: "user", content: question });

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method:  "POST",
        headers: {
          "Content-Type":  "application/json",
          "Authorization": `Bearer ${GROQ_KEY}`
        },
        body: JSON.stringify({
          model:    "llama-3.3-70b-versatile",
          messages: [
            { role: "system", content: SYSTEM_PROMPT },
            ...conversationHistory
          ],
          max_tokens:  512,
          temperature: 0.7
        })
      });

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error?.message || "API error " + res.status);
      }

      const data   = await res.json();
      const answer = data.choices?.[0]?.message?.content
                     || "Sorry, I could not generate a response.";

      conversationHistory.push({ role: "assistant", content: answer });
      if (conversationHistory.length > 40) conversationHistory.splice(0, 2);

      hideTyping();

      const formatted = answer
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/\n/g, "<br/>");

      appendMessage("bot", formatted);

    } catch (err) {
      console.error("Crescent AI error:", err);
      hideTyping();
      appendMessage("bot",
        `<span style="display:flex;align-items:center;gap:6px;color:#991B1B;">⚠️ <span>${err.message || "Unable to reach Crescent AI. Please try again."}</span></span>`
      );
      conversationHistory.pop();
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  /* ── QUICK PROMPTS ── */
  window.sendQuick = function(text) {
    inputEl.value = text;
    ask();
  };

  /* Initial focus */
  inputEl.focus();
  scrollBottom();
</script>

</body>
</html>
